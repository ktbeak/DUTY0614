<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학급 청소당번 뽑기</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: "Pretendard", "Noto Sans KR", "맑은 고딕", sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .student-card {
      transition: all 0.35s ease;
    }

    .student-card.active {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 18px 35px rgba(79, 70, 229, 0.35);
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-sky-400 to-emerald-300 d-flex align-items-center justify-content-center p-4">

  <main class="container">
    <section class="glass-card rounded-5 shadow-lg p-4 p-md-5 mx-auto" style="max-width: 850px;">

      <div class="text-center mb-4">
        <div class="badge bg-primary-subtle text-primary fs-6 px-3 py-2 mb-3">
          CLASS CLEANING PICKER
        </div>

        <h1 class="fw-bold display-6 text-gray-800 mb-3">
          🧹 학급 청소당번 생성기
        </h1>

        <p class="text-secondary fs-5 mb-0">
          1번부터 30번 중 <strong class="text-primary">중복 없이 5명</strong>을 랜덤으로 선정합니다.
        </p>
      </div>

      <div class="row g-3 text-center mb-4">
        <div class="col-4">
          <div class="bg-white rounded-4 shadow-sm p-3">
            <div class="text-secondary small">전체 번호</div>
            <div class="fs-3 fw-bold text-primary">30</div>
          </div>
        </div>

        <div class="col-4">
          <div class="bg-white rounded-4 shadow-sm p-3">
            <div class="text-secondary small">선정 인원</div>
            <div class="fs-3 fw-bold text-success">5</div>
          </div>
        </div>

        <div class="col-4">
          <div class="bg-white rounded-4 shadow-sm p-3">
            <div class="text-secondary small">방식</div>
            <div class="fs-5 fw-bold text-indigo-600">랜덤</div>
          </div>
        </div>
      </div>

      <div class="d-grid d-md-flex justify-content-center gap-3 mb-5">
        <button id="pickBtn" class="btn btn-primary btn-lg rounded-pill px-5 shadow">
          🎲 당번 뽑기
        </button>

        <button id="resetBtn" class="btn btn-light btn-lg rounded-pill px-5 shadow-sm">
          🔄 초기화
        </button>
      </div>

      <div class="row g-3 justify-content-center" id="cardArea">
        <div class="col-6 col-md">
          <div class="student-card bg-white rounded-4 shadow-sm p-4 text-center">
            <div class="text-secondary small mb-2">1번째 당번</div>
            <div class="student-number fs-2 fw-bold text-gray-400">?</div>
          </div>
        </div>

        <div class="col-6 col-md">
          <div class="student-card bg-white rounded-4 shadow-sm p-4 text-center">
            <div class="text-secondary small mb-2">2번째 당번</div>
            <div class="student-number fs-2 fw-bold text-gray-400">?</div>
          </div>
        </div>

        <div class="col-6 col-md">
          <div class="student-card bg-white rounded-4 shadow-sm p-4 text-center">
            <div class="text-secondary small mb-2">3번째 당번</div>
            <div class="student-number fs-2 fw-bold text-gray-400">?</div>
          </div>
        </div>

        <div class="col-6 col-md">
          <div class="student-card bg-white rounded-4 shadow-sm p-4 text-center">
            <div class="text-secondary small mb-2">4번째 당번</div>
            <div class="student-number fs-2 fw-bold text-gray-400">?</div>
          </div>
        </div>

        <div class="col-6 col-md">
          <div class="student-card bg-white rounded-4 shadow-sm p-4 text-center">
            <div class="text-secondary small mb-2">5번째 당번</div>
            <div class="student-number fs-2 fw-bold text-gray-400">?</div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script>
    const pickBtn = document.getElementById("pickBtn");
    const resetBtn = document.getElementById("resetBtn");
    const cards = document.querySelectorAll(".student-card");
    const numbers = document.querySelectorAll(".student-number");

    function pickStudents() {
      const studentNumbers = Array.from({ length: 30 }, (_, i) => i + 1);
      const selected = [];

      while (selected.length < 5) {
        const randomIndex = Math.floor(Math.random() * studentNumbers.length);
        selected.push(studentNumbers.splice(randomIndex, 1)[0]);
      }

      selected.sort((a, b) => a - b);

      cards.forEach(card => card.classList.remove("active"));
      numbers.forEach(num => {
        num.textContent = "?";
        num.className = "student-number fs-2 fw-bold text-gray-400";
      });

      selected.forEach((num, index) => {
        setTimeout(() => {
          numbers[index].textContent = `${num}번`;
          numbers[index].className = "student-number fs-2 fw-bold text-primary";
          cards[index].classList.add("active");
        }, index * 250);
      });

      setTimeout(() => {
        Swal.fire({
          title: "오늘의 청소당번 선정 완료! 🎉",
          html: `
            <div style="font-size:22px; font-weight:700; color:#2563eb;">
              ${selected.map(num => `${num}번`).join(" · ")}
            </div>
          `,
          icon: "success",
          confirmButtonText: "확인",
          confirmButtonColor: "#4f46e5",
          background: "#ffffff",
          backdrop: `
            rgba(79,70,229,0.35)
          `
        });
      }, 1500);
    }

    function resetCards() {
      cards.forEach(card => card.classList.remove("active"));
      numbers.forEach(num => {
        num.textContent = "?";
        num.className = "student-number fs-2 fw-bold text-gray-400";
      });

      Swal.fire({
        title: "초기화 완료",
        text: "다시 청소당번을 뽑을 수 있습니다.",
        icon: "info",
        confirmButtonText: "확인",
        confirmButtonColor: "#0d6efd"
      });
    }

    pickBtn.addEventListener("click", pickStudents);
    resetBtn.addEventListener("click", resetCards);
  </script>

</body>
</html>
